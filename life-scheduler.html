<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F5F2EE" id="themeColorMeta" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Life Scheduler" />
<link rel="manifest" id="manifestLink" />
<title>Life Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F2EE; --card:#FFFFFF; --border:#E2DDD7; --border-light:#EDE9E4;
    --text:#1A1714; --text-sec:#7A7370; --text-ter:#A8A4A0;
    --red:#C13B3B; --red-bg:#FDF0F0;
    --amber:#A05C12; --amber-bg:#FDF4E7;
    --green:#3A6B1A; --green-bg:#EFF5E8;
    --accent:#2F5BE8; --accent-bg:#EEF2FD;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  }
  [data-theme="dark"] {
    --bg:#141210; --card:#1E1C1A; --border:#2E2B28; --border-light:#252220;
    --text:#EDE9E4; --text-sec:#8A8582; --text-ter:#5A5754;
    --red:#E05555; --red-bg:#2A1818; --amber:#D4842A; --amber-bg:#261C0E;
    --green:#6AAF3A; --green-bg:#162210; --accent:#5B82F0; --accent-bg:#151D38;
    --shadow:0 1px 3px rgba(0,0,0,.3); --shadow-md:0 4px 16px rgba(0,0,0,.4);
  }
  [data-theme="sepia"] {
    --bg:#F2EBE0; --card:#FBF6EF; --border:#DDD0BC; --border-light:#E8DDCE;
    --text:#2C1F0E; --text-sec:#7A6650; --text-ter:#A89880;
    --accent:#8B5E2A; --accent-bg:#F2E8D8;
  }
  [data-theme="ocean"] {
    --bg:#EBF2F8; --card:#FFFFFF; --border:#C8DDE9; --border-light:#D8E8F2;
    --text:#0D2233; --text-sec:#4A6A80; --text-ter:#8AAABB;
    --accent:#1A6FA8; --accent-bg:#DDF0FF;
    --green:#1A7A5A; --green-bg:#D8F2E8;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .2s,color .2s;}
  input,select,button,textarea{font-family:'DM Sans',sans-serif;font-size:14px;}
  input[type="text"],input[type="date"],input[type="number"],input[type="search"],select{
    width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--card);color:var(--text);outline:none;transition:border-color .15s;
  }
  input:focus,select:focus{border-color:var(--accent);}

  .app{max-width:680px;margin:0 auto;padding:20px 16px 90px;}

  /* HEADER */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border-light);}
  .header-left h1{font-size:21px;font-weight:600;letter-spacing:-.3px;}
  .header-left p{font-size:12px;color:var(--text-sec);margin-top:2px;}
  .header-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}

  /* BUTTONS */
  .btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap;}
  .btn:hover{border-color:var(--text-sec);}
  .btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
  .btn-primary:hover{opacity:.85;}
  .btn-sm{padding:6px 11px;font-size:13px;}
  .btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text-sec);cursor:pointer;transition:all .15s;}
  .btn-icon:hover{color:var(--text);border-color:var(--text-sec);}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .stat{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);}
  .stat-label{font-size:10px;color:var(--text-ter);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .stat-num{font-size:24px;font-weight:600;line-height:1;font-family:'DM Mono',monospace;}
  .stat-num.red{color:var(--red);} .stat-num.amber{color:var(--amber);} .stat-num.green{color:var(--green);}

  /* TOOLBAR */
  .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
  .search-wrap{flex:1;position:relative;}
  .search-wrap input{padding-left:34px;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-ter);font-size:15px;pointer-events:none;}
  .sort-sel{width:auto;padding:9px 10px;font-size:13px;}

  /* FILTERS */
  .filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-chip{padding:4px 12px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--text-sec);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
  .filter-chip:hover{color:var(--text);border-color:var(--text-sec);}
  .filter-chip.active{background:var(--text);color:var(--bg);border-color:var(--text);}

  /* TASK CARDS */
  .task-list{display:flex;flex-direction:column;gap:6px;}
  .task-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow);transition:box-shadow .15s;position:relative;overflow:hidden;}
  .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .task-card.urgent::before{background:var(--red);}
  .task-card.soon::before{background:var(--amber);}
  .task-card.ok::before{background:var(--green);}
  .task-card:hover{box-shadow:var(--shadow-md);}
  .cat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .task-body{flex:1;min-width:0;}
  .task-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .task-meta{font-size:11px;color:var(--text-sec);margin-top:2px;}
  .task-hist{font-size:11px;color:var(--text-ter);margin-top:1px;}
  .task-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .due-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;font-family:'DM Mono',monospace;}
  .due-badge.red{background:var(--red-bg);color:var(--red);}
  .due-badge.amber{background:var(--amber-bg);color:var(--amber);}
  .due-badge.green{background:var(--green-bg);color:var(--green);}
  .done-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-sec);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .done-btn:hover{background:var(--green-bg);color:var(--green);border-color:var(--green);}
  .icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-ter);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .icon-btn:hover{color:var(--text);border-color:var(--text-sec);}
  .empty{text-align:center;padding:40px 20px;color:var(--text-ter);}
  .empty-icon{font-size:32px;margin-bottom:8px;}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:50;}
  .fab:hover{transform:scale(1.08);}

  /* MODALS */
  .overlay{position:fixed;inset:0;background:rgba(10,8,6,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(3px);}
  @media(min-width:600px){.overlay{align-items:center;}.modal{border-radius:var(--radius) !important;max-height:88vh;}}
  .modal{background:var(--card);width:100%;max-width:500px;border-radius:var(--radius) var(--radius) 0 0;padding:22px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-md);}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border-light);}

  /* RESCHEDULE */
  .resch-opts{display:flex;flex-direction:column;gap:7px;margin:10px 0;}
  .resch-opt{padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif;}
  .resch-opt:hover,.resch-opt.selected{border-color:var(--accent);background:var(--accent-bg);}
  .resch-opt-title{font-size:13px;font-weight:500;color:var(--text);}
  .resch-opt-date{font-size:12px;color:var(--text-sec);margin-top:2px;font-family:'DM Mono',monospace;}

  /* HISTORY */
  .hist-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
  .hist-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light);}
  .hist-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .hist-name{font-size:13px;font-weight:500;}
  .hist-date{font-size:12px;color:var(--text-sec);font-family:'DM Mono',monospace;white-space:nowrap;}

  /* SETTINGS */
  .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0;}
  .theme-opt{padding:10px 6px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .15s;}
  .theme-opt:hover{border-color:var(--accent);}
  .theme-opt.active{border-color:var(--accent);background:var(--accent-bg);}
  .theme-swatch{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;border:1px solid rgba(0,0,0,.1);}
  .theme-name{font-size:11px;font-weight:500;color:var(--text-sec);}
  .section-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-ter);margin:18px 0 8px;}
  .data-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .pwa-tip{font-size:13px;color:var(--text-sec);line-height:1.5;}

  /* SNACK */
  .snack{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:99px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:all .2s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .snack.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:480px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .task-right{flex-wrap:wrap;justify-content:flex-end;}
    .header-right .add-label{display:none;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Life Scheduler</h1>
      <p id="headerDate"></p>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="openHistory()" title="Storico">📋</button>
      <button class="btn-icon" onclick="openSettings()" title="Impostazioni">⚙️</button>
      <button class="btn btn-sm btn-primary" onclick="openAdd()">+ <span class="add-label">Aggiungi</span></button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Urgenti</div><div class="stat-num red" id="sUrgent">0</div></div>
    <div class="stat"><div class="stat-label">Imminenti</div><div class="stat-num amber" id="sSoon">0</div></div>
    <div class="stat"><div class="stat-label">In ordine</div><div class="stat-num green" id="sOk">0</div></div>
    <div class="stat"><div class="stat-label">Totale</div><div class="stat-num" id="sTotal">0</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="Cerca attività…" oninput="render()" />
    </div>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="due">Per scadenza</option>
      <option value="name">Per nome</option>
      <option value="cat">Per categoria</option>
      <option value="created">Recenti</option>
    </select>
  </div>

  <div class="filters" id="filters"></div>
  <div class="task-list" id="taskList"></div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nuova attività</h2>
    <div class="field">
      <label>Nome attività</label>
      <input type="text" id="fName" placeholder="es. Annaffiare le piante" />
    </div>
    <div class="field-row">
      <div class="field"><label>Categoria</label><select id="fCat"></select></div>
      <div class="field">
        <label>Tipo</label>
        <select id="fType" onchange="toggleRecur()">
          <option value="recurring">Ricorrente</option>
          <option value="oneshot">Una tantum</option>
        </select>
      </div>
    </div>
    <div id="recurRow" class="field-row">
      <div class="field"><label>Ogni</label><input type="number" id="fInterval" value="7" min="1" /></div>
      <div class="field">
        <label>Unità</label>
        <select id="fUnit">
          <option value="days">giorni</option>
          <option value="weeks">settimane</option>
          <option value="months">mesi</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Prossima scadenza</label><input type="date" id="fDue" /></div>
    <div class="field"><label>Note (opzionale)</label><input type="text" id="fNote" placeholder="Dettagli aggiuntivi…" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="saveTask()">Salva</button>
    </div>
  </div>
</div>

<!-- DONE MODAL -->
<div class="overlay" id="doneModal" style="display:none" onclick="if(event.target===this)closeDone()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>✓ Fatto!</h2>
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:4px;" id="doneTaskName"></p>
    <div class="resch-opts" id="reschOpts"></div>
    <div class="field" style="margin-top:8px;"><label>Oppure data manuale</label><input type="date" id="fManual" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeDone()">Annulla</button>
      <button class="btn btn-primary" onclick="confirmDone()">Conferma</button>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="overlay" id="histModal" style="display:none" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📋 Storico completamenti</h2>
    <div class="hist-list" id="histList"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="clearHistory()" style="color:var(--red)">Svuota</button>
      <button class="btn btn-primary" onclick="closeHistory()">Chiudi</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsModal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>⚙️ Impostazioni</h2>

    <div class="section-sep">Tema</div>
    <div class="theme-grid" id="themeGrid"></div>

    <div class="section-sep">Dati</div>
    <div class="data-actions">
      <button class="btn btn-sm" onclick="exportData()">⬇ Esporta JSON</button>
      <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">⬆ Importa JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)" />
      <button class="btn btn-sm" style="color:var(--red)" onclick="resetAll()">🗑 Reset</button>
    </div>

    <div class="section-sep">Installa app (PWA)</div>
    <p class="pwa-tip">Su <strong>iOS/Safari</strong>: tocca Condividi → "Aggiungi a schermata Home"<br>Su <strong>Android/Chrome</strong>: menu ⋮ → "Installa app"</p>
    <div id="pwaBtn" style="margin-top:8px"></div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeSettings()">Chiudi</button>
    </div>
  </div>
</div>

<div class="snack" id="snack"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────
const CATS={
  casa:     {label:'Casa',     icon:'🏠',bg:'#EEF5FB'},
  auto:     {label:'Auto',     icon:'🚗',bg:'#FDF4E7'},
  salute:   {label:'Salute',   icon:'❤️',bg:'#FDF0F0'},
  pagamenti:{label:'Pagamenti',icon:'💳',bg:'#F0EEFE'},
  giardino: {label:'Giardino', icon:'🌿',bg:'#EEF6E5'},
  altro:    {label:'Altro',    icon:'📦',bg:'#F4F1EC'}
};
const DARK_CATS={
  casa:'#0E1E2C',auto:'#261C0E',salute:'#2A1010',
  pagamenti:'#131228',giardino:'#0E1C0A',altro:'#1A1814'
};
const FILTERS=[
  {key:'all',label:'Tutti'},{key:'urgent',label:'🔴 Urgenti'},
  {key:'casa',label:'🏠 Casa'},{key:'auto',label:'🚗 Auto'},
  {key:'salute',label:'❤️ Salute'},{key:'pagamenti',label:'💳 Pagamenti'},
  {key:'giardino',label:'🌿 Giardino'},{key:'altro',label:'📦 Altro'}
];
const THEMES=[
  {id:'light',name:'Chiaro',bg:'#F5F2EE',card:'#FFF'},
  {id:'dark', name:'Scuro', bg:'#141210',card:'#1E1C1A'},
  {id:'sepia',name:'Sepia', bg:'#F2EBE0',card:'#FBF6EF'},
  {id:'ocean',name:'Ocean', bg:'#EBF2F8',card:'#FFF'}
];
const LS_TASKS='ls_v3_tasks', LS_HIST='ls_v3_history', LS_THEME='ls_v3_theme';

// ── STATE ─────────────────────────────────────────────────────────────
let tasks=[], history=[], activeFilter='all', editId=null, doneId=null, selResch=null;

// ── LOAD / SAVE ───────────────────────────────────────────────────────
function load(){
  try{tasks=JSON.parse(localStorage.getItem(LS_TASKS)||'[]');}catch(e){tasks=[];}
  try{history=JSON.parse(localStorage.getItem(LS_HIST)||'[]');}catch(e){history=[];}
  if(!tasks.length) tasks=defaultTasks();
  applyTheme(localStorage.getItem(LS_THEME)||'light',false);
}
function save(){localStorage.setItem(LS_TASKS,JSON.stringify(tasks));}
function saveHist(){localStorage.setItem(LS_HIST,JSON.stringify(history));}

function defaultTasks(){
  const d=n=>{const dt=new Date();dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];};
  return [
    {id:1,name:'Pagare bolletta luce', cat:'pagamenti',type:'recurring',interval:1, unit:'months',due:d(-2), note:'',history:[]},
    {id:2,name:'Annaffiare le piante', cat:'giardino', type:'recurring',interval:3, unit:'days',  due:d(0),  note:'',history:[]},
    {id:3,name:'Tagliando auto',       cat:'auto',     type:'recurring',interval:12,unit:'months',due:d(45), note:'Officina Rossi',history:[]},
    {id:4,name:'Visita dentista',      cat:'salute',   type:'recurring',interval:6, unit:'months',due:d(10), note:'',history:[]},
    {id:5,name:'Cambio filtro caldaia',cat:'casa',     type:'recurring',interval:12,unit:'months',due:d(-5), note:'',history:[]},
  ];
}

// ── HELPERS ───────────────────────────────────────────────────────────
const daysUntil=s=>{const t=new Date();t.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.round((d-t)/86400000);};
const urgency=t=>{const d=daysUntil(t.due);return d<=0?'urgent':d<=5?'soon':'ok';};
function dueLabel(t){const d=daysUntil(t.due);if(d<0)return`${Math.abs(d)}gg fa`;if(d===0)return'Oggi';if(d===1)return'Domani';return`+${d}gg`;}
function recurLabel(t){if(t.type==='oneshot')return'Una tantum';const u={days:'g',weeks:'sett',months:'mesi'};return`Ogni ${t.interval} ${u[t.unit]}`;}
function addInterval(ds,n,unit){const d=new Date(ds);if(unit==='days')d.setDate(d.getDate()+n);else if(unit==='weeks')d.setDate(d.getDate()+n*7);else d.setMonth(d.getMonth()+n);return d.toISOString().split('T')[0];}
function fmtDate(s){return new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}
function fmtDT(s){return new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function catBg(k){return isDark()?DARK_CATS[k]||DARK_CATS.altro:(CATS[k]||CATS.altro).bg;}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  document.getElementById('headerDate').textContent=
    new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const u=tasks.filter(t=>urgency(t)==='urgent').length;
  const s=tasks.filter(t=>urgency(t)==='soon').length;
  document.getElementById('sUrgent').textContent=u;
  document.getElementById('sSoon').textContent=s;
  document.getElementById('sOk').textContent=tasks.filter(t=>urgency(t)==='ok').length;
  document.getElementById('sTotal').textContent=tasks.length;

  document.getElementById('filters').innerHTML=FILTERS.map(f=>
    `<button class="filter-chip${activeFilter===f.key?' active':''}" data-f="${f.key}">${f.label}</button>`
  ).join('');

  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  const sort=document.getElementById('sortSel').value;

  let list=[...tasks];
  if(activeFilter==='urgent') list=list.filter(t=>urgency(t)==='urgent');
  else if(activeFilter!=='all') list=list.filter(t=>t.cat===activeFilter);
  if(q) list=list.filter(t=>t.name.toLowerCase().includes(q)||(t.note||'').toLowerCase().includes(q));

  if(sort==='due') list.sort((a,b)=>new Date(a.due)-new Date(b.due));
  else if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'it'));
  else if(sort==='cat') list.sort((a,b)=>a.cat.localeCompare(b.cat));
  else list.sort((a,b)=>b.id-a.id);

  const el=document.getElementById('taskList');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">${q?'🔍':'✨'}</div>${q?`Nessun risultato per "${q}"`:'Nessuna attività qui'}</div>`;
    return;
  }
  el.innerHTML=list.map(t=>{
    const cat=CATS[t.cat]||CATS.altro;
    const urg=urgency(t);
    const dc=urg==='urgent'?'red':urg==='soon'?'amber':'green';
    const last=t.history&&t.history.length?`Ultima: ${fmtDate(t.history[t.history.length-1])}`:'';
    return `<div class="task-card ${urg}">
      <div class="cat-icon" style="background:${catBg(t.cat)}">${cat.icon}</div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">${recurLabel(t)}${t.note?' · '+t.note:''}</div>
        ${last?`<div class="task-hist">${last}</div>`:''}
      </div>
      <div class="task-right">
        <span class="due-badge ${dc}">${dueLabel(t)}</span>
        <button class="done-btn" onclick="openDone(${t.id})">✓ Fatto</button>
        <button class="icon-btn" onclick="openEdit(${t.id})" title="Modifica">✎</button>
        <button class="icon-btn" onclick="del(${t.id})" title="Elimina" style="font-size:16px">×</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.filter-chip');if(!b)return;
  activeFilter=b.dataset.f;render();
});

// ── ADD / EDIT ────────────────────────────────────────────────────────
function buildCatOptions(sel){
  document.getElementById('fCat').innerHTML=Object.entries(CATS).map(([k,v])=>
    `<option value="${k}"${sel===k?' selected':''}>${v.icon} ${v.label}</option>`
  ).join('');
}
function toggleRecur(){
  document.getElementById('recurRow').style.display=
    document.getElementById('fType').value==='recurring'?'grid':'none';
}
function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Nuova attività';
  document.getElementById('fName').value='';
  buildCatOptions('casa');
  document.getElementById('fType').value='recurring';
  document.getElementById('fInterval').value=7;
  document.getElementById('fUnit').value='days';
  document.getElementById('fDue').value=new Date().toISOString().split('T')[0];
  document.getElementById('fNote').value='';
  toggleRecur();
  document.getElementById('addModal').style.display='flex';
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Modifica attività';
  document.getElementById('fName').value=t.name;
  buildCatOptions(t.cat);
  document.getElementById('fType').value=t.type;
  document.getElementById('fInterval').value=t.interval||7;
  document.getElementById('fUnit').value=t.unit||'days';
  document.getElementById('fDue').value=t.due;
  document.getElementById('fNote').value=t.note||'';
  toggleRecur();
  document.getElementById('addModal').style.display='flex';
}
function closeModal(){document.getElementById('addModal').style.display='none';}
function saveTask(){
  const name=document.getElementById('fName').value.trim();
  if(!name){snack('Inserisci un nome');return;}
  const existing=editId?tasks.find(x=>x.id===editId):null;
  const t={
    id:editId||Date.now(),name,
    cat:document.getElementById('fCat').value,
    type:document.getElementById('fType').value,
    interval:parseInt(document.getElementById('fInterval').value)||7,
    unit:document.getElementById('fUnit').value,
    due:document.getElementById('fDue').value,
    note:document.getElementById('fNote').value.trim(),
    history:existing?existing.history:[]
  };
  if(editId){tasks=tasks.map(x=>x.id===editId?t:x);snack('Aggiornata ✓');}
  else{tasks.push(t);snack('Aggiunta ✓');}
  save();closeModal();render();
}

// ── DELETE ────────────────────────────────────────────────────────────
function del(id){
  if(!confirm('Eliminare?'))return;
  tasks=tasks.filter(t=>t.id!==id);save();render();snack('Eliminata');
}

// ── DONE ──────────────────────────────────────────────────────────────
function openDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  doneId=id;selResch=null;
  document.getElementById('doneTaskName').textContent=t.name;
  document.getElementById('fManual').value='';
  const today=new Date().toISOString().split('T')[0];
  let html='';
  if(t.type==='recurring'){
    const ft=addInterval(today,t.interval,t.unit);
    const fd=addInterval(t.due,t.interval,t.unit);
    html=`
      <button class="resch-opt" onclick="pickResch(this,'${ft}')">
        <div class="resch-opt-title">Da oggi</div>
        <div class="resch-opt-date">Prossima: ${fmtDate(ft)}</div>
      </button>
      <button class="resch-opt" onclick="pickResch(this,'${fd}')">
        <div class="resch-opt-title">Dalla scadenza originale</div>
        <div class="resch-opt-date">Prossima: ${fmtDate(fd)}</div>
      </button>`;
  } else {
    html=`<p style="font-size:13px;color:var(--text-sec);padding:8px 0">Scegli data manuale per tenerla, oppure conferma per eliminarla.</p>`;
  }
  document.getElementById('reschOpts').innerHTML=html;
  document.getElementById('doneModal').style.display='flex';
}
function pickResch(btn,date){
  document.querySelectorAll('.resch-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');selResch=date;
}
function closeDone(){document.getElementById('doneModal').style.display='none';selResch=null;}
function confirmDone(){
  const t=tasks.find(x=>x.id===doneId);if(!t)return;
  const date=document.getElementById('fManual').value||selResch;
  if(t.type==='recurring'&&!date){snack('Scegli quando rischedulare');return;}
  if(!t.history)t.history=[];
  t.history.push(new Date().toISOString().split('T')[0]);
  history.unshift({taskId:t.id,taskName:t.name,cat:t.cat,completedAt:new Date().toISOString()});
  if(history.length>300)history=history.slice(0,300);
  saveHist();
  if(date){t.due=date;snack(`Rischedulato: ${fmtDate(date)}`);}
  else{tasks=tasks.filter(x=>x.id!==doneId);snack('Completato ✓');}
  save();closeDone();render();
}

// ── HISTORY MODAL ─────────────────────────────────────────────────────
function openHistory(){
  const el=document.getElementById('histList');
  if(!history.length){
    el.innerHTML='<div class="empty" style="padding:20px"><div class="empty-icon">📭</div>Nessun completamento ancora</div>';
  } else {
    el.innerHTML=history.map(h=>{
      const cat=CATS[h.cat]||CATS.altro;
      return `<div class="hist-item">
        <div class="hist-dot"></div>
        <div style="flex:1;min-width:0">
          <div class="hist-name">${h.taskName}</div>
          <div style="font-size:11px;color:var(--text-ter)">${cat.icon} ${cat.label}</div>
        </div>
        <div class="hist-date">${fmtDT(h.completedAt)}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('histModal').style.display='flex';
}
function closeHistory(){document.getElementById('histModal').style.display='none';}
function clearHistory(){
  if(!confirm('Svuotare lo storico?'))return;
  history=[];tasks.forEach(t=>t.history=[]);saveHist();save();snack('Storico svuotato');closeHistory();
}

// ── THEMES ────────────────────────────────────────────────────────────
function applyTheme(id,persist=true){
  document.documentElement.setAttribute('data-theme',id==='light'?'':id);
  document.getElementById('themeColorMeta').content=THEMES.find(t=>t.id===id)?.bg||'#F5F2EE';
  if(persist)localStorage.setItem(LS_THEME,id);
  render();
}
function openSettings(){
  const cur=localStorage.getItem(LS_THEME)||'light';
  document.getElementById('themeGrid').innerHTML=THEMES.map(t=>`
    <div class="theme-opt${cur===t.id?' active':''}" onclick="selectTheme('${t.id}',this)">
      <div class="theme-swatch" style="background:${t.bg}"></div>
      <div class="theme-name">${t.name}</div>
    </div>`).join('');
  document.getElementById('settingsModal').style.display='flex';
}
function selectTheme(id,el){
  applyTheme(id);
  document.querySelectorAll('.theme-opt').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}
function closeSettings(){document.getElementById('settingsModal').style.display='none';}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({tasks,history,exportedAt:new Date().toISOString(),version:3},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`life-scheduler-${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(a.href);
  snack('Backup esportato ✓');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.tasks||!Array.isArray(d.tasks))throw new Error();
      if(!confirm(`Importare ${d.tasks.length} attività? I dati attuali verranno sovrascritti.`))return;
      tasks=d.tasks;history=d.history||[];save();saveHist();render();
      snack(`Importate ${tasks.length} attività ✓`);
    }catch{snack('File non valido');}
  };
  r.readAsText(file);e.target.value='';
}
function resetAll(){
  if(!confirm('Eliminare TUTTI i dati? Azione irreversibile.'))return;
  tasks=defaultTasks();history=[];save();saveHist();render();snack('Reset effettuato');closeSettings();
}

// ── PWA ───────────────────────────────────────────────────────────────
const manifest={name:'Life Scheduler',short_name:'Scheduler',start_url:'.',display:'standalone',
  background_color:'#F5F2EE',theme_color:'#F5F2EE',
  icons:[{src:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1714'/><text y='.9em' font-size='75' x='10'>📋</text></svg>`,sizes:'any',type:'image/svg+xml'}]
};
document.getElementById('manifestLink').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('pwaBtn').innerHTML=
    `<button class="btn btn-sm btn-primary" onclick="installPWA()">📲 Installa app ora</button>`;
});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}

if('serviceWorker' in navigator){
  const sw=`const C='ls-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeDone();closeHistory();closeSettings();}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});

load();render();
</script>
